name: 缺陷报告
description: 提交可复现、已脱敏的 QuickPaste 稳定性或体验问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请勿上传真实剪贴板数据库、聊天记录、账号、未脱敏路径或包含隐私的截图。
  - type: input
    id: version
    attributes:
      label: 版本与安装方式
      description: 例如 0.2.0、NSIS 安装包或开发构建。
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Windows 环境
      description: Windows build、DPI、显示器数量及是否涉及管理员窗口。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请提供最短、稳定的编号步骤。
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 脱敏证据
      description: 可粘贴不含剪贴板正文的错误文字或日志片段；截图必须先遮盖隐私。
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认内容不含真实剪贴板、账号、密钥、聊天记录或未脱敏个人路径。
          required: true
