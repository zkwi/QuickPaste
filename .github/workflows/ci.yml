name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Windows governance gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run governance gate
        run: npm run check:governance

  frontend:
    name: Windows frontend gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend gate
        run: npm run check:frontend

  rust:
    name: Windows Rust gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@39b0b3842c7e8bbf6904c0bfc3d9006fdd4dc4e0 # 1.88.0
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: src-tauri -> target
          key: ${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust gate
        run: npm run check:rust
