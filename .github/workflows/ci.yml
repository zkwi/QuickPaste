name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance:
    name: Windows governance gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run governance gate
        run: npm run check:governance

  frontend:
    name: Windows frontend gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend gate
        run: npm run check:frontend

  rust:
    name: Windows Rust gate
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        env:
          npm_config_force: true
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy, rustfmt

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          key: ${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Set up npm
        working-directory: ${{ runner.temp }}
        run: npm install --global npm@11.9.0

      - name: Install frontend dependencies
        run: npm ci

      - name: Run Rust gate
        run: npm run check:rust
