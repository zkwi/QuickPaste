# Windows 候选包允许的第三方许可证；新增依赖超出此集合时，生成命令必须失败并人工复核。
accepted = [
  "0BSD",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "ISC",
  "MIT",
  "MIT-0",
  "MPL-2.0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

targets = ["x86_64-pc-windows-msvc"]
ignore-build-dependencies = false
ignore-dev-dependencies = true
private = { ignore = true }
